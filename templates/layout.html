<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Workshop System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #222; color: white; padding-top: 20px; }
        .sidebar h2 { text-align: center; }
        .sidebar a { display: block; padding: 12px; color: white; text-decoration: none; }
        .sidebar a:hover { background: #444; }
        .content { flex: 1; padding: 20px; background: #f4f6f9; }
        .top { display: flex; justify-content: space-between; margin-bottom: 20px; }
        table { width: 100%; background: white; border-collapse: collapse; }
        th { background: #333; color: white; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; vertical-align: top; }
        button, select, input, textarea { font: inherit; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
        @media (max-width: 768px) {
            body { display: block; }
            .sidebar { width: 100%; height: auto; }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>Workshop</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/planner">Daily Jobs</a>
    <a href="/customers">Customers</a>
    <a href="/reminders">Reminders</a>
    <a href="/lost">Lost Work</a>
    <a href="/reports">Reports</a>
    <a href="/add">+ Booking</a>
    <a href="/walkin">+ Walk-In</a>
    <a href="/logout">Logout</a>
</div>
<div class="content">
    <div class="top">
        <h2>{{ branch }}</h2>
    </div>
    {% block content %}{% endblock %}
</div>
</body>
</html>
