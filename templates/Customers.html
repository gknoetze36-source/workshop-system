{% extends "layout.html" %}
{% block content %}

<h3>Customers</h3>

<table>
<tr><th>Name</th><th>Phone</th><th></th></tr>
{% for c in customers %}
<tr>
<td>{{ c.first_name }} {{ c.surname }}</td>
<td>{{ c.phone or '-' }}</td>
<td>
{% if c.phone %}
<a href="/customer/{{ c.phone }}">View</a>
{% else %}
-
{% endif %}
</td>
</tr>
{% else %}
<tr>
<td colspan="3">No customers found.</td>
</tr>
{% endfor %}
</table>

{% endblock %}
