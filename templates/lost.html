{% extends "layout.html" %}
{% block content %}

<h3>Lost Work</h3>

<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Vehicle</th>
<th>Date</th>
</tr>
{% for b in bookings %}
<tr>
<td>{{ b.first_name }} {{ b.surname }}</td>
<td>{{ b.phone or '-' }}</td>
<td>{{ b.make }} {{ b.model }}</td>
<td>{{ b.date }}</td>
</tr>
{% else %}
<tr>
<td colspan="4">No declined work found.</td>
</tr>
{% endfor %}
</table>

{% endblock %}
