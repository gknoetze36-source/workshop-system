{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="topbar">
    <div class="heading">
        <h1>Update your password</h1>
        <p>This account must move off a legacy or temporary password before normal access continues.</p>
    </div>
</div>
<section class="panel" style="max-width:700px;">
    {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
    <form method="post" class="grid-form">
        <label>Current password<input type="password" name="current_password" required></label>
        <div class="grid two">
            <label>New password<input type="password" name="new_password" required></label>
            <label>Confirm new password<input type="password" name="confirm_password" required></label>
        </div>
        <button type="submit">Save New Password</button>
    </form>
</section>
{% endblock %}
