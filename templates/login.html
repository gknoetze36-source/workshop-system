<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta charset="utf-8">
<style>
body { font-family: Arial, sans-serif; background:#667eea; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
.box { background:white; padding:30px; border-radius:10px; width:320px; }
input, button { width:100%; padding:10px; margin:10px 0; box-sizing:border-box; }
button { background:#333; color:white; }
.error { color:#b00020; margin-top:10px; }
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<form method="POST">
<input name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
{% if error %}
<p class="error">{{ error }}</p>
{% endif %}
<p><a href="/signup">Create company account</a></p>
</div>
</body>
</html>
