{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<section class="panel">
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <div class="actions"><a class="button" href="{{ url_for('home') }}">Home</a>{% if current_user %}<a class="button alt" href="{{ url_for('dashboard') }}">Dashboard</a>{% else %}<a class="button alt" href="{{ url_for('login') }}">Login</a>{% endif %}</div>
</section>
{% endblock %}
